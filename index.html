<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith Games</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <iframe
      class="site-bg-game"
      title="Tetris background"
      src="./tetris-arcade-gameatari-1988/tetris-arcade-gameatari-1988/dist/index.html"
      tabindex="-1"
      sandbox="allow-scripts allow-same-origin"
    ></iframe>
    <div class="site-overlay"></div>

    <div class="site-content">
      <header class="header">
        <img
          class="brand-logo"
          src="./image.png"
          alt="Zenith logo"
        />
        <h1>Zenith Games</h1>
        <p>اختار اللعبة اللي بدك ياها والعب مباشرة</p>
      </header>

      <main class="layout">
        <section class="games-panel">
          <h2>قائمة الألعاب</h2>
          <div id="games-list" class="games-list"></div>
        </section>

        <section class="player-panel">
          <div class="player-top">
            <h2 id="game-title">اختَر لعبة من القائمة</h2>
            <button id="open-new-tab" class="secondary-btn" disabled>
              افتح في تبويب جديد
            </button>
          </div>
          <iframe
            id="game-frame"
            class="game-frame"
            title="game-player"
            src="about:blank"
            sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"
            referrerpolicy="no-referrer"
          ></iframe>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
