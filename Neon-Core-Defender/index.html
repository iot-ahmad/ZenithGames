<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Core Defender</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="score-display">0</div>
        
        <div id="start-screen" class="glass-panel">
            <h1>NEON CORE</h1>
            <h2>DEFENDER</h2>
            <p>Rotate the shield to protect the core from incoming enemies.</p>
            <p class="controls-hint">Desktop: Left/Right Arrows or Click & Drag<br>Mobile: Touch & Drag</p>
            <button id="start-btn" class="neon-button">START GAME</button>
        </div>

        <div id="game-over-screen" class="glass-panel hidden">
            <h1>SYSTEM FAILURE</h1>
            <p>CORE BREACHED</p>
            <div class="score-container">
                <p>SCORE: <span id="final-score">0</span></p>
                <p>BEST: <span id="best-score">0</span></p>
            </div>
            <button id="restart-btn" class="neon-button">REBOOT SYSTEM</button>
        </div>
    </div>
    
    <canvas id="game-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
